<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>דאשבורד לידים — תרפיית מימדים</title>
<style>
  :root{--bg:#f6f7f9;--card:#fff;--line:#e6e8eb;--txt:#1f2a24;--muted:#6b7280;--green:#0F6E56;--amber:#BA7517;--blue:#185FA5;--gray:#6b7280;--red:#A32D2D;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI","Arial Hebrew",Arial,sans-serif;background:var(--bg);color:var(--txt);padding:20px;font-size:14px}
  .wrap{max-width:1200px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px}
  h1{font-size:22px;color:var(--green)}
  .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .btn{background:var(--green);color:#fff;border:0;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
  .tabs{display:flex;gap:6px;background:#eef0f2;border-radius:10px;padding:4px;width:fit-content;margin-bottom:14px}
  .tab{border:0;background:transparent;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;color:var(--muted);font-weight:600}
  .tab.on{background:#fff;color:var(--green);box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
  .card .n{font-size:28px;font-weight:700}
  .card .l{color:var(--muted);font-size:13px;margin-top:2px}
  .card.hot .n{color:var(--green)} .card.warm .n{color:var(--amber)} .card.chat .n{color:var(--blue)} .card.conv .n{color:var(--green)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .panel h2{font-size:15px;margin-bottom:12px}
  .bars{display:flex;flex-direction:column;gap:8px}
  .bar-row{display:flex;align-items:center;gap:10px}
  .bar-row .lab{width:150px;font-size:13px;color:var(--muted);flex-shrink:0}
  .bar-track{flex:1;background:#eef0f2;border-radius:6px;height:22px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:12px;font-weight:600;min-width:26px}
  .toolbar{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  input[type=search]{flex:1;min-width:200px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  select{padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);font-size:13px}
  th{background:#fafbfc;color:var(--muted);font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:var(--txt)}
  tr:last-child td{border-bottom:0}
  tr:hover td{background:#fafbfc}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
  .p-warm{background:#FAEEDA;color:#8a5a10} .p-chat{background:#E6F1FB;color:#0C447C} .p-hot{background:#EAF3DE;color:#27500A} .p-gray{background:#eef0f2;color:#555}
  .score{font-weight:700}
  .muted{color:var(--muted)}
  .err{background:#FCEBEB;color:#A32D2D;padding:12px;border-radius:8px;margin-bottom:12px}
  @media(max-width:600px){.bar-row .lab{width:100px}th:nth-child(6),td:nth-child(6),th:nth-child(7),td:nth-child(7){display:none}}
  tbody tr{cursor:pointer}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:24px 12px;overflow-y:auto}
  .modal-bg.on{display:flex}
  .lead-card{background:#fff;border-radius:14px;max-width:640px;width:100%;padding:0;overflow:hidden}
  .lead-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .lead-head h3{font-size:17px}
  .lead-meta{color:var(--muted);font-size:12.5px;margin-top:4px;line-height:1.6}
  .x{border:0;background:#eef0f2;border-radius:8px;width:30px;height:30px;font-size:15px;cursor:pointer;flex-shrink:0}
  .insight{background:#F3F9F6;border:1px solid #cfe5db;border-radius:10px;margin:14px 18px;padding:12px 14px;font-size:13.5px;line-height:1.65}
  .insight b{color:var(--green)}
  .insight .gen{margin-top:8px}
  .chat{padding:6px 18px 18px;max-height:52vh;overflow-y:auto;background:#f7f5f0}
  .chat-title{font-size:13px;color:var(--muted);padding:10px 18px 4px;background:#f7f5f0}
  .bub{max-width:82%;padding:8px 12px;border-radius:12px;margin:6px 0;font-size:13.5px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .bub.u{background:#fff;border:1px solid var(--line);margin-left:auto;border-radius:12px 12px 12px 3px}
  .bub.b{background:#DCF6E8;margin-right:auto;border-radius:12px 12px 3px 12px}
  .sysnote{text-align:center;color:#98a0a8;font-size:11.5px;margin:8px 0;font-style:italic}
  .btn2{background:#fff;color:var(--green);border:1px solid var(--green);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12.5px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>דאשבורד לידים — תרפיית מימדים</h1>
      <div class="sub" id="updated">טוען…</div>
    </div>
    <button class="btn" onclick="load()">רענן ⟳</button>
  </header>
  <div id="error"></div>
  <div class="tabs">
    <button class="tab on" id="tab-drip" onclick="setView('drip')">🔥 פלואו חימום</button>
    <button class="tab" id="tab-all" onclick="setView('all')">כל הפניות</button>
  </div>
  <div class="cards" id="cards"></div>
  <div class="panel" id="funnel-panel" style="display:none"><h2>📉 משפך המרה — מתהליך לתהליך</h2><div class="bars" id="funnel"></div><div id="funnel-steps" style="margin-top:12px;font-size:13px;color:var(--muted)"></div></div>
  <div class="panel" id="report-panel" style="display:none">
    <details><summary style="cursor:pointer;font-size:15px;font-weight:600">📋 סקירה שבועית אחרונה <span id="report-date" class="muted" style="font-weight:400;font-size:13px"></span></summary>
    <div id="report-text" style="white-space:pre-wrap;line-height:1.7;margin-top:10px;font-size:13.5px"></div></details>
  </div>
  <div class="panel"><h2>שלב בפלואו</h2><div class="bars" id="stages"></div></div>
  <div class="panel"><h2>פילוח פרסונות</h2><div class="bars" id="personas"></div></div>
  <div class="toolbar">
    <input type="search" id="q" placeholder="חיפוש לפי שם או טלפון…" oninput="render()">
    <select id="filter" onchange="render()">
      <option value="">כל הסטטוסים</option>
      <option value="in_sequence">בחימום</option>
      <option value="active_chat">בשיחה</option>
      <option value="hot">חם 🔥</option>
      <option value="engaged">ענו (בשיחה + חם)</option>
      <option value="cold">סיים רצף</option>
      <option value="unsubscribed">הוסר</option>
    </select>
  </div>
  <table id="tbl">
    <thead><tr>
      <th onclick="sortBy('name')">שם</th>
      <th onclick="sortBy('phone')">טלפון</th>
      <th onclick="sortBy('stage')">שלב בפלואו</th>
      <th onclick="sortBy('persona')">פרסונה</th>
      <th onclick="sortBy('score')">ציון חום</th>
      <th onclick="sortBy('msgCount')">הודעות</th>
      <th onclick="sortBy('createdTs')">נכנס</th>
      <th onclick="sortBy('lastTs')">פעילות אחרונה</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeLead()">
  <div class="lead-card">
    <div class="lead-head">
      <div><h3 id="ld-name"></h3><div class="lead-meta" id="ld-meta"></div></div>
      <button class="x" onclick="closeLead()">✕</button>
    </div>
    <div class="insight" id="ld-insight"></div>
    <div class="chat-title">💬 תיעוד השיחה המלא</div>
    <div class="chat" id="ld-chat"></div>
  </div>
</div>
<script>
let KEY = new URLSearchParams(location.search).get("key") || localStorage.getItem("cmtm_key") || "";
let DATA = [], NOW = Date.now(), sortKey="lastTs", sortDir=-1;
let VIEW = localStorage.getItem("cmtm_view") || "drip";
function setView(v){
  VIEW=v; localStorage.setItem("cmtm_view",v);
  document.getElementById("tab-drip").classList.toggle("on", v==="drip");
  document.getElementById("tab-all").classList.toggle("on", v==="all");
  stats(); render();
}
function viewData(){ return VIEW==="drip" ? DATA.filter(l=>l.source==="drip") : DATA; }
function promptKey(){ const k=prompt("הזן מפתח גישה לדאשבורד:", KEY||"cmtm-wizup-7421"); if(k){ KEY=k.trim(); localStorage.setItem("cmtm_key",KEY); load(); } }

const STATUS = {
  in_sequence:{cls:"p-warm", lab:l=>"חימום · הודעה "+(l.seqStep+1)+"/10"},
  active_chat:{cls:"p-chat", lab:()=>"בשיחה עם הבוט"},
  hot:{cls:"p-hot", lab:()=>"🔥 ליד חם"},
  cold:{cls:"p-gray", lab:()=>"סיים רצף"},
  unsubscribed:{cls:"p-gray", lab:()=>"הוסר"},
};
const PERSONA = {career:"הסבה לקריירה", parent:"הורה", therapist:"מטפל/ת", religious:"מגזר דתי", unknown:"לא ידוע"};

function rel(ts){
  if(!ts) return "—";
  const s=(NOW-ts)/1000;
  if(s<60) return "עכשיו";
  if(s<3600) return "לפני "+Math.floor(s/60)+" דק'";
  if(s<86400) return "לפני "+Math.floor(s/3600)+" שע'";
  return "לפני "+Math.floor(s/86400)+" ימים";
}
function absDate(ts){ if(!ts) return ""; const d=new Date(ts); return d.toLocaleDateString("he-IL")+" "+d.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}); }

async function load(){
  document.getElementById("error").innerHTML="";
  try{
    if(!KEY){ document.getElementById("error").innerHTML='<div class="err">נדרש מפתח גישה. <button class="btn" onclick="promptKey()">הזן מפתח</button></div>'; return; }
    const r = await fetch("/admin/data?secret="+encodeURIComponent(KEY));
    if(!r.ok){
      if(r.status===401){ document.getElementById("error").innerHTML='<div class="err">מפתח שגוי. <button class="btn" onclick="promptKey()">נסה שוב</button></div>'; return; }
      throw new Error("שגיאה "+r.status);
    }
    localStorage.setItem("cmtm_key", KEY);
    const j = await r.json();
    NOW = j.now; DATA = j.leads;
    DATA.forEach(l=> l.lastTs = Math.max(l.lastInboundTs||0, l.lastDripTs||0, l.createdTs||0));
    const fails=(j.failures||[]).filter(f=>NOW-f.ts<48*3600000);
    if(fails.length){
      document.getElementById("error").innerHTML='<div class="err">⚠️ '+fails.length+' הודעות נתקלו בתקלה ב-48 השעות האחרונות (קיבלו הודעת חירום): '+fails.map(f=>(f.name||f.phone)).join(", ")+'</div>';
    }
    if(j.report && j.report.text){
      document.getElementById("report-panel").style.display="block";
      document.getElementById("report-date").textContent = "· "+new Date(j.report.ts).toLocaleDateString("he-IL");
      document.getElementById("report-text").textContent = j.report.text;
    }
    const dripCount=DATA.filter(l=>l.source==="drip").length;
    document.getElementById("updated").textContent = "עודכן "+new Date(NOW).toLocaleTimeString("he-IL")+" · "+dripCount+" בפלואו חימום · "+DATA.length+" פניות סה״כ · חימום "+(j.dripEnabled?"פעיל":"כבוי")+(j.paused?" · ⏸️ מושהה":"");
    setView(VIEW);
  }catch(e){ document.getElementById("error").innerHTML='<div class="err">'+e.message+'</div>'; }
}
function stats(){
  const D=viewData();
  const count=(f)=>D.filter(f).length;
  const total=D.length;
  const warm=count(l=>l.status==="in_sequence");
  const chat=count(l=>l.status==="active_chat");
  const hot=count(l=>l.status==="hot");
  const cold=count(l=>l.status==="cold");
  const unsub=count(l=>l.status==="unsubscribed");
  const engaged=chat+hot; // ענו למשהו
  // מדידת אחוזים הוגנת: רק לידים שקיבלו את ההודעה הראשונה לפני 24+ שעות
  const dayAgo=NOW-24*3600000;
  const matured=D.filter(l=>l.createdTs && l.createdTs<=dayAgo);
  const fresh=total-matured.length;
  const mTotal=matured.length;
  const mEngaged=matured.filter(l=>l.status==="active_chat"||l.status==="hot").length;
  const mHot=matured.filter(l=>l.status==="hot").length;
  const mUnsub=matured.filter(l=>l.status==="unsubscribed").length;
  const engRate= mTotal? Math.round(mEngaged/mTotal*100):0;
  const convRate= mTotal? Math.round(mHot/mTotal*100):0;
  const cards= VIEW==="drip" ? [
    {n:total,l:"נכנסו לחימום",c:"",f:""},
    {n:warm,l:"בתהליך חימום",c:"warm",f:"in_sequence"},
    {n:engaged,l:"ענו (יצאו מהרצף)",c:"chat",f:"engaged"},
    {n:hot,l:"חמים 🔥",c:"hot",f:"hot"},
    {n:engRate+"%",l:"אחוז תגובה (24ש+)",c:"conv"},
    {n:convRate+"%",l:"המרה לחם (24ש+)",c:"conv"},
    {n:unsub,l:"הוסרו",c:"",f:"unsubscribed"},
  ] : [
    {n:total,l:"סה״כ פניות",c:"",f:""},
    {n:warm,l:"בחימום",c:"warm",f:"in_sequence"},
    {n:chat,l:"בשיחה",c:"chat",f:"active_chat"},
    {n:hot,l:"חמים 🔥",c:"hot",f:"hot"},
    {n:convRate+"%",l:"אחוז המרה לחם",c:"conv"},
    {n:unsub,l:"הוסרו",c:"",f:"unsubscribed"},
  ];
  const curF=document.getElementById("filter").value;
  document.getElementById("cards").innerHTML = cards.map(c=>{
    const clickable = c.f!==undefined;
    const active = clickable && curF===c.f && c.f!=="";
    return `<div class="card ${c.c}" ${clickable?`onclick="filterStatus('${c.f}')" style="cursor:pointer${active?';outline:2px solid var(--green)':''}" title="לחץ לסינון"`:""}><div class="n">${c.n}</div><div class="l">${c.l}</div></div>`;
  }).join("");
  // משפך המרה (רק בתצוגת פלואו חימום)
  const fu=document.getElementById("funnel-panel");
  if(VIEW==="drip" && total){
    fu.style.display="block";
    const pct=(a,b)=> b? Math.round(a/b*100):0;
    const row=(label,count,color,note)=>{
      const w=Math.max(pct(count,total),count?6:0);
      return `<div class="bar-row"><div class="lab">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${color}">${count}</div></div><div style="min-width:190px;font-size:12.5px;color:var(--muted);flex-shrink:0">${note}</div></div>`;
    };
    const rowM=(label,count,color,note)=>{
      const w=Math.max(pct(count,mTotal),count?6:0);
      return `<div class="bar-row"><div class="lab">${label}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${color}">${count}</div></div><div style="min-width:190px;font-size:12.5px;color:var(--muted);flex-shrink:0">${note}</div></div>`;
    };
    document.getElementById("funnel").innerHTML =
      `<div style="font-size:12.5px;color:var(--muted);margin-bottom:8px">נמדד על לידים שקיבלו את ההודעה הראשונה לפני 24+ שעות (${mTotal})${fresh?` · ${fresh} טריים מדי וייכנסו למדידה מחר`:""}</div>`+
      rowM("1️⃣ נכנסו לחימום",mTotal,"#888780","100%")+
      rowM("2️⃣ ענו לבוט",mEngaged,"#378ADD",pct(mEngaged,mTotal)+"% מהנכנסים")+
      rowM("3️⃣ הפכו חמים 🔥",mHot,"#639922",pct(mHot,mTotal)+"% מהנכנסים · "+pct(mHot,mEngaged)+"% מהעונים")+
      rowM("🚫 הוסרו",mUnsub,"#c0c4c9",pct(mUnsub,mTotal)+"% מהנכנסים");
    // אחרי איזו הודעה ברצף ענו
    const stepCount={};
    D.filter(l=>l.status==="active_chat"||l.status==="hot").forEach(l=>{const k=Math.max(0,l.seqStep);stepCount[k]=(stepCount[k]||0)+1;});
    const stepsHtml=Object.keys(stepCount).sort((a,b)=>a-b).map(st=>`<span class="pill p-chat" style="margin-inline-end:6px;margin-bottom:4px;display:inline-block">אחרי הודעה ${+st+1}: ${stepCount[st]} ענו</span>`).join("");
    document.getElementById("funnel-steps").innerHTML = stepsHtml? "💬 <b>אחרי איזו הודעה ברצף ענו:</b><br>"+stepsHtml : "";
  } else { fu.style.display="none"; }
  // שלבים
  const stageDefs=[["in_sequence","בחימום","#EF9F27"],["active_chat","בשיחה","#378ADD"],["hot","חם 🔥","#639922"],["cold","סיים רצף","#9aa1a8"],["unsubscribed","הוסר","#c0c4c9"]];
  const max=Math.max(1,total);
  document.getElementById("stages").innerHTML = stageDefs.map(([k,lab,col])=>{
    const c=count(l=>l.status===k), w=Math.round(c/max*100);
    return `<div class="bar-row"><div class="lab">${lab}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(w,c?6:0)}%;background:${col}">${c||""}</div></div></div>`;
  }).join("");
  // פרסונות
  const pmax=Math.max(1,total);
  document.getElementById("personas").innerHTML = Object.keys(PERSONA).map(k=>{
    const c=count(l=>(l.persona||"unknown")===k), w=Math.round(c/pmax*100);
    return `<div class="bar-row"><div class="lab">${PERSONA[k]}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.max(w,c?6:0)}%;background:#534AB7">${c||""}</div></div></div>`;
  }).join("");
}
function filterStatus(v){
  document.getElementById("filter").value=v;
  stats(); render();
  document.getElementById("tbl").scrollIntoView({behavior:"smooth",block:"start"});
}
function sortBy(k){ if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir=-1;} render(); }
function render(){
  const q=document.getElementById("q").value.trim();
  const f=document.getElementById("filter").value;
  let rows=viewData().slice();
  if(f==="engaged") rows=rows.filter(l=>l.status==="active_chat"||l.status==="hot");
  else if(f) rows=rows.filter(l=>l.status===f);
  if(q) rows=rows.filter(l=>(l.name||"").includes(q)||(l.phone||"").includes(q));
  rows.sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if(sortKey==="stage"){x=a.status;y=b.status;}
    if(typeof x==="string"){return (x<y?-1:x>y?1:0)*sortDir;}
    return ((x||0)-(y||0))*sortDir;
  });
  document.getElementById("rows").innerHTML = rows.map(l=>{
    const st=STATUS[l.status]||{cls:"p-gray",lab:()=>l.status};
    return `<tr onclick="openLead('${l.phone}')" title="${(l.summary||'לחץ לתיק הליד').replace(/"/g,'&quot;')}">
      <td>${l.name||'<span class="muted">—</span>'}</td>
      <td class="muted">${l.phone}</td>
      <td><span class="pill ${st.cls}">${st.lab(l)}</span></td>
      <td>${PERSONA[l.persona]||l.persona}</td>
      <td class="score">${l.score}</td>
      <td>${l.msgCount||0}</td>
      <td title="${absDate(l.createdTs)}">${rel(l.createdTs)}</td>
      <td title="${absDate(l.lastTs)}">${rel(l.lastTs)}</td>
    </tr>`;
  }).join("") || '<tr><td colspan="8" class="muted" style="text-align:center;padding:24px">אין לידים תואמים</td></tr>';
}
// ===== תיק ליד =====
let CUR_PHONE = null;
const esc = (s)=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
async function openLead(phone){
  CUR_PHONE = phone;
  document.getElementById("modal").classList.add("on");
  document.getElementById("ld-name").textContent = "טוען...";
  document.getElementById("ld-meta").textContent = phone;
  document.getElementById("ld-insight").innerHTML = "";
  document.getElementById("ld-chat").innerHTML = "";
  try{
    const r = await fetch("/admin/lead?secret="+encodeURIComponent(KEY)+"&phone="+encodeURIComponent(phone));
    if(!r.ok) throw new Error("שגיאה "+r.status);
    renderLead(await r.json());
  }catch(e){ document.getElementById("ld-name").textContent = "שגיאה: "+e.message; }
}
function closeLead(){ document.getElementById("modal").classList.remove("on"); CUR_PHONE=null; }
function renderLead(l){
  const st=STATUS[l.status]||{cls:"p-gray",lab:()=>l.status};
  document.getElementById("ld-name").textContent = l.name || l.phone;
  document.getElementById("ld-meta").innerHTML =
    `${l.phone} · <span class="pill ${st.cls}">${st.lab(l)}</span> · ${PERSONA[l.persona]||l.persona} · ציון חום: <b>${l.score}</b><br>`+
    `נכנס: ${absDate(l.createdTs)}${l.lastInboundTs?` · הודעה אחרונה ממנו: ${absDate(l.lastInboundTs)}`:""}`;
  document.getElementById("ld-insight").innerHTML =
    `<b>🧠 מה נועה הבינה:</b><br>`+
    (l.summary ? esc(l.summary) : `<span class="muted">עדיין אין סיכום לליד הזה.</span>`)+
    `<div class="gen"><button class="btn2" onclick="genSummary()">${l.summary?"🔄 רענן סיכום":"✨ צור סיכום מהשיחה"}</button></div>`;
  const chat = document.getElementById("ld-chat");
  if(!l.history || !l.history.length){
    chat.innerHTML = '<div class="sysnote">אין עדיין שיחה עם הליד הזה</div>';
  } else {
    chat.innerHTML = l.history.map(t=>{
      const txt = t.content || "";
      if(t.role==="assistant" && txt.startsWith("[") && txt.endsWith("]"))
        return `<div class="sysnote">${esc(txt.slice(1,-1))}</div>`;
      return `<div class="bub ${t.role==="user"?"u":"b"}">${esc(txt)}</div>`;
    }).join("");
    chat.scrollTop = chat.scrollHeight;
  }
}
async function genSummary(){
  if(!CUR_PHONE) return;
  const box = document.getElementById("ld-insight");
  box.innerHTML = "<b>🧠 מה נועה הבינה:</b><br>מנתחת את השיחה...";
  try{
    const r = await fetch("/admin/summarize",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({secret:KEY,phone:CUR_PHONE})});
    const j = await r.json();
    if(!r.ok) throw new Error(j.error||("שגיאה "+r.status));
    openLead(CUR_PHONE);
  }catch(e){ box.innerHTML = "<b>🧠 מה נועה הבינה:</b><br>לא הצלחתי לסכם: "+esc(e.message); }
}
load().then(()=>{ const p=new URLSearchParams(location.search).get("lead"); if(p) openLead(p); });
setInterval(load, 30000);
</script>
